services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: techmart
      MYSQL_USER: techmart
      MYSQL_PASSWORD: techmart
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/sample-data.sql:/docker-entrypoint-initdb.d/02-sample-data.sql
      - techmart-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "techmart", "--password=techmart"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  wildfly:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "9990:9990"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  techmart-mysql-data:
