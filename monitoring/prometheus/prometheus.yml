global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: techmart-monitor
    environment: performance-test

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # WildFly JVM via JMX Prometheus exporter agent
  - job_name: wildfly-jmx
    static_configs:
      - targets: ['wildfly:9404']
    metrics_path: /metrics
    scrape_interval: 10s

  # TechMart business metrics via Micrometer (/actuator/prometheus in the WAR)
  - job_name: techmart-app
    static_configs:
      - targets: ['wildfly:8080']
    metrics_path: /techmart/actuator/prometheus
    scrape_interval: 15s

  # Host OS metrics
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # MySQL metrics
  - job_name: mysql-exporter
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Docker container metrics
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 10s
