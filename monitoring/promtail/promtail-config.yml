server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: wildfly-server-log
    static_configs:
      - targets:
          - localhost
        labels:
          job: wildfly
          service: techmart
          environment: performance-test
          __path__: /wildfly/logs/server.log

    pipeline_stages:
      # Merge multi-line stack traces into a single log entry
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}'
          max_wait_time: 3s
          max_lines: 128

      # Parse WildFly log format: "YYYY-MM-DD HH:MM:SS,SSS LEVEL  [logger] (thread) message"
      - regex:
          expression: '^(?P<log_time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})\s+(?P<level>[A-Z]+)\s+\[(?P<logger>[^\]]+)\]\s+\((?P<thread>[^)]+)\)\s+(?P<message>[\s\S]*)'

      - labels:
          level:
          logger:
          thread:

      - timestamp:
          source: log_time
          format: '2006-01-02 15:04:05,000'

      # Drop DEBUG and TRACE to reduce noise
      - drop:
          expression: '.*'
          source: level
          value: DEBUG
      - drop:
          expression: '.*'
          source: level
          value: TRACE
