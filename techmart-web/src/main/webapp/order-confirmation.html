<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Confirmation · TechMart Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head><body>
  <div id="tm-navbar"></div>
  <main class="container py-4">
    <div id="tm-order">
      <div class="text-center text-muted py-5">Loading order…</div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script><script src="js/auth.js"></script><script src="js/websocket.js"></script>
  <script>
    let _orderId = null;

    function getOrderIdParam() {
      const raw = new URLSearchParams(location.search).get('id');
      return raw;
    }

    async function loadOrder() {
      const host = document.getElementById('tm-order');
      if (!_orderId) {
        host.innerHTML = `<div class="alert alert-warning">No order specified.
          <a href="${APP_BASE}order-history.html" class="alert-link">View your orders</a>.</div>`;
        return;
      }
      try {
        const order = await apiCall('GET', '/orders/' + encodeURIComponent(_orderId));
        renderOrder(order);
      } catch (e) {
        host.innerHTML = `<div class="alert alert-danger">Could not load this order.
          <a href="${APP_BASE}order-history.html" class="alert-link">Back to orders</a>.</div>`;
      }
    }

    function renderOrder(order) {
      const host = document.getElementById('tm-order');
      const number = escapeHtml(order.orderNumber || ('#' + order.id));
      const date = escapeHtml(formatDate(order.createdAt || order.orderDate || order.date));
      const total = escapeHtml(formatCurrency(order.total !== undefined ? order.total : order.totalAmount));
      const items = Array.isArray(order.items) ? order.items : [];

      const itemRows = items.length === 0
        ? '<tr><td colspan="4" class="text-center text-muted py-3">No items.</td></tr>'
        : items.map(it => {
            const name = escapeHtml(it.productName || it.name || ('Product #' + it.productId));
            const qty = (it.quantity !== undefined && it.quantity !== null) ? it.quantity : 1;
            const unit = (it.unitPrice !== undefined && it.unitPrice !== null) ? it.unitPrice : it.price;
            const line = (it.subtotal !== undefined && it.subtotal !== null)
              ? it.subtotal : (Number(unit || 0) * Number(qty));
            return `
              <tr>
                <td>${name}</td>
                <td class="text-center">${escapeHtml(String(qty))}</td>
                <td class="text-end">${escapeHtml(formatCurrency(unit))}</td>
                <td class="text-end">${escapeHtml(formatCurrency(line))}</td>
              </tr>`;
          }).join('');

      const address = order.shippingAddress
        ? `<p class="text-muted mb-0"><strong>Shipping to:</strong> ${escapeHtml(order.shippingAddress)}</p>` : '';

      host.innerHTML = `
        <div class="text-center mb-4">
          <div class="display-5 text-success mb-2">✓ Order Placed</div>
          <p class="lead mb-1">Thank you! Your order <strong>${number}</strong> has been received.</p>
          <p class="text-muted">Placed on ${date}</p>
        </div>
        <div class="card mx-auto" style="max-width:720px">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div>
                <div class="text-muted small">Order number</div>
                <div class="fw-semibold">${number}</div>
              </div>
              <div class="text-end">
                <div class="text-muted small mb-1">Status</div>
                <div id="tm-order-status">${statusBadge(order.status)}</div>
              </div>
            </div>
            ${address}
            <div class="table-responsive mt-3">
              <table class="table align-middle mb-0">
                <thead>
                  <tr>
                    <th>Product</th>
                    <th class="text-center">Qty</th>
                    <th class="text-end">Unit price</th>
                    <th class="text-end">Line total</th>
                  </tr>
                </thead>
                <tbody>${itemRows}</tbody>
                <tfoot>
                  <tr>
                    <th colspan="3" class="text-end">Total</th>
                    <th class="text-end">${total}</th>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
        <div class="text-center mt-4">
          <a href="${APP_BASE}order-history.html" class="btn btn-outline-secondary">View all orders</a>
          <a href="${APP_BASE}products.html" class="btn btn-primary">Continue shopping</a>
        </div>`;
    }

    /* Live status updates over WebSocket: refresh when this order changes. */
    window.onTechMartNotification = function(msg) {
      if (msg && msg.type === 'ORDER_UPDATE' && _orderId != null
          && String(msg.orderId) === String(_orderId)) {
        loadOrder();
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('');
      if (!requireAuth()) return;
      _orderId = getOrderIdParam();
      loadOrder();
    });
  </script>
</body></html>
