<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products · TechMart Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head><body>
  <div id="tm-navbar"></div>

  <main class="container py-4">
    <div class="row">

      <aside class="col-lg-3 mb-4">
        <div class="card tm-filter-sidebar">
          <div class="card-body">
            <h2 class="h6 text-uppercase text-muted mb-3">Filters</h2>

            <div class="mb-3">
              <label class="form-label fw-semibold">Category</label>
              <select id="f-category" class="form-select">
                <option value="">All categories</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Price range</label>
              <div class="d-flex gap-2">
                <input id="f-min" type="number" min="0" step="0.01" class="form-control" placeholder="Min">
                <input id="f-max" type="number" min="0" step="0.01" class="form-control" placeholder="Max">
              </div>
            </div>

            <div class="d-grid gap-2">
              <button id="f-apply" class="btn btn-primary">Apply filters</button>
              <button id="f-clear" class="btn btn-outline-secondary">Clear</button>
            </div>
          </div>
        </div>
      </aside>

      <section class="col-lg-9">
        <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
          <h1 class="h4 mb-0">Products</h1>
          <input id="f-search" type="search" class="form-control" placeholder="Search products…"
                 style="max-width:340px" aria-label="Search products">
        </div>

        <div id="result-meta" class="text-muted small mb-2"></div>

        <div id="product-grid" class="row">
          <div class="col-12 tm-loading">Loading products…</div>
        </div>

        <nav aria-label="Product pagination" class="mt-3">
          <ul id="pagination" class="pagination justify-content-center"></ul>
        </nav>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script><script src="js/auth.js"></script><script src="js/websocket.js"></script>
  <script src="js/products.js"></script>
  <script>
    const PAGE_SIZE = 12;
    const state = { page: 0, keyword: '', category: '', minPrice: '', maxPrice: '', total: 0 };

    const els = {
      category: null, min: null, max: null, search: null,
      grid: null, pagination: null, meta: null
    };

    function readControls() {
      state.keyword = els.search.value.trim();
      state.category = els.category.value;
      state.minPrice = els.min.value.trim();
      state.maxPrice = els.max.value.trim();
    }

    async function loadCount() {
      // /products/count returns the total active count (does not honour filters
      // in the contract), so it represents the catalogue size for pagination.
      try { state.total = Number(await apiCall('GET', '/products/count')) || 0; }
      catch (e) { state.total = 0; }
    }

    async function loadProducts() {
      const grid = els.grid;
      grid.innerHTML = '<div class="col-12 tm-loading">Loading products…</div>';
      const qs = buildProductQuery({
        page: state.page, size: PAGE_SIZE, keyword: state.keyword,
        category: state.category, minPrice: state.minPrice, maxPrice: state.maxPrice
      });
      let products = [];
      try {
        products = await apiCall('GET', '/products' + qs);
      } catch (e) {
        grid.innerHTML =
          '<div class="col-12"><div class="alert alert-light border text-center text-muted py-5">' +
          'Could not load products right now.</div></div>';
        els.pagination.innerHTML = '';
        return;
      }
      renderProductGrid(products, grid);
      renderMeta(products.length);
      renderPagination(products.length);
    }

    function isFiltered() {
      return !!(state.keyword || state.category || state.minPrice || state.maxPrice);
    }

    function renderMeta(shown) {
      if (isFiltered()) {
        els.meta.textContent = shown + ' result' + (shown === 1 ? '' : 's') + ' on this page';
      } else {
        els.meta.textContent = state.total + ' product' + (state.total === 1 ? '' : 's') + ' available';
      }
    }

    function renderPagination(shownCount) {
      const ul = els.pagination;
      ul.innerHTML = '';
      // When unfiltered we know the total -> exact page count. When filtered,
      // we infer "has next" from whether a full page was returned.
      const totalPages = isFiltered()
        ? null
        : Math.max(1, Math.ceil(state.total / PAGE_SIZE));
      const hasPrev = state.page > 0;
      const hasNext = isFiltered()
        ? shownCount === PAGE_SIZE
        : state.page < (totalPages - 1);

      if (!hasPrev && !hasNext && state.page === 0) return;

      const li = (label, page, opts) => {
        const o = opts || {};
        const cls = 'page-item' + (o.disabled ? ' disabled' : '') + (o.active ? ' active' : '');
        const a = document.createElement('a');
        a.className = 'page-link';
        a.href = '#';
        a.textContent = label;
        if (!o.disabled && !o.active && page != null) {
          a.addEventListener('click', (e) => { e.preventDefault(); goToPage(page); });
        } else {
          a.addEventListener('click', (e) => e.preventDefault());
        }
        const item = document.createElement('li');
        item.className = cls;
        item.appendChild(a);
        return item;
      };

      ul.appendChild(li('« Prev', state.page - 1, { disabled: !hasPrev }));

      if (totalPages != null) {
        const windowSize = 5;
        let start = Math.max(0, state.page - 2);
        let end = Math.min(totalPages - 1, start + windowSize - 1);
        start = Math.max(0, end - windowSize + 1);
        for (let p = start; p <= end; p++) {
          ul.appendChild(li(String(p + 1), p, { active: p === state.page }));
        }
      } else {
        ul.appendChild(li('Page ' + (state.page + 1), null, { active: true }));
      }

      ul.appendChild(li('Next »', state.page + 1, { disabled: !hasNext }));
    }

    function goToPage(p) {
      state.page = Math.max(0, p);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      loadProducts();
    }

    function applyFilters() {
      readControls();
      state.page = 0;
      loadProducts();
    }

    // debounce helper
    function debounce(fn, ms) {
      let t;
      return function () {
        clearTimeout(t);
        const args = arguments, ctx = this;
        t = setTimeout(() => fn.apply(ctx, args), ms);
      };
    }

    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar('products');
      refreshCartCount();

      els.category = document.getElementById('f-category');
      els.min = document.getElementById('f-min');
      els.max = document.getElementById('f-max');
      els.search = document.getElementById('f-search');
      els.grid = document.getElementById('product-grid');
      els.pagination = document.getElementById('pagination');
      els.meta = document.getElementById('result-meta');

      wireAddToCart(els.grid);

      // Seed from URL
      const urlKeyword = getQueryParam('keyword') || '';
      const urlCategory = getQueryParam('category') || '';
      els.search.value = urlKeyword;

      // Populate categories
      const cats = await loadCategories();
      cats.forEach(c => {
        const opt = document.createElement('option');
        // Filtering is by category id per the API query param semantics.
        opt.value = String(c.id);
        opt.textContent = c.name + (c.productCount ? (' (' + c.productCount + ')') : '');
        els.category.appendChild(opt);
      });
      if (urlCategory) els.category.value = urlCategory;

      readControls();

      // Events
      document.getElementById('f-apply').addEventListener('click', applyFilters);
      document.getElementById('f-clear').addEventListener('click', () => {
        els.search.value = ''; els.category.value = ''; els.min.value = ''; els.max.value = '';
        applyFilters();
      });
      els.category.addEventListener('change', applyFilters);
      els.min.addEventListener('change', applyFilters);
      els.max.addEventListener('change', applyFilters);
      els.search.addEventListener('input', debounce(applyFilters, 300));

      await loadCount();
      await loadProducts();
    });
  </script>
</body></html>
