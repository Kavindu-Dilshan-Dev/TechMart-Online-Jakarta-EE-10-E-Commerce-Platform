<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account · TechMart Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head><body class="bg-light">
  <div id="tm-navbar"></div>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 fw-bold text-center mb-1">Create your account</h1>
            <p class="text-muted text-center mb-4">Join TechMart Online to start shopping</p>

            <form id="register-form" novalidate>
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="firstName" class="form-label">First name</label>
                  <input type="text" class="form-control" id="firstName" name="firstName" autocomplete="given-name" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="lastName" class="form-label">Last name</label>
                  <input type="text" class="form-control" id="lastName" name="lastName" autocomplete="family-name" required>
                </div>
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="tel" class="form-control" id="phone" name="phone" autocomplete="tel">
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" required>
              </div>
              <button type="submit" class="btn btn-primary w-100" id="register-btn">Create account</button>
            </form>

            <p class="text-center text-muted mt-4 mb-0">
              Already have an account? <a href="login.html">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script><script src="js/auth.js"></script><script src="js/websocket.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('');

      const form = document.getElementById('register-form');
      const btn = document.getElementById('register-btn');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          username: document.getElementById('username').value.trim(),
          email: document.getElementById('email').value.trim(),
          firstName: document.getElementById('firstName').value.trim(),
          lastName: document.getElementById('lastName').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          password: document.getElementById('password').value
        };
        if (!payload.username || !payload.email || !payload.firstName || !payload.lastName || !payload.password) {
          showToast('Please fill in all required fields', 'warning');
          return;
        }
        btn.disabled = true;
        try {
          await register(payload);
          showToast('Account created. Please sign in.', 'success');
          setTimeout(() => location.href = 'login.html', 900);
        } catch (err) {
          /* apiCall already shows a toast on failure */
          btn.disabled = false;
        }
      });
    });
  </script>
</body></html>
