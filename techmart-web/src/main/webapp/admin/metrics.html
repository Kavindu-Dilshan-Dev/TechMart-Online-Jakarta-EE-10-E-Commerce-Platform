<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Performance Metrics · Admin · TechMart Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="../css/dashboard.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head><body>
  <div id="tm-navbar"></div>
  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <h1 class="h3 mb-0">Performance Metrics</h1>
      <span class="text-muted small">Auto-refreshing every 5s · <span id="tm-last-updated">—</span></span>
    </div>

    <div class="row g-3 mb-4" id="tm-cards">
      <div class="col-12 col-sm-6 col-lg-3"><div class="metric-card bg-grad-blue">
        <div class="metric-label">Uptime</div><div class="metric-value" id="tm-uptime">—</div></div></div>
      <div class="col-12 col-sm-6 col-lg-3"><div class="metric-card bg-grad-green">
        <div class="metric-label">Active Users</div><div class="metric-value" id="tm-active-users">—</div></div></div>
      <div class="col-12 col-sm-6 col-lg-3"><div class="metric-card bg-grad-purple">
        <div class="metric-label">Total Requests</div><div class="metric-value" id="tm-total-requests">—</div></div></div>
      <div class="col-12 col-sm-6 col-lg-3"><div class="metric-card bg-grad-orange">
        <div class="metric-label">Avg Response</div><div class="metric-value" id="tm-avg-response">—</div>
        <div class="metric-sub">milliseconds</div></div></div>
    </div>

    <div class="row g-4">

      <div class="col-12 col-lg-7">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white"><strong>Circuit Breakers</strong></div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-sm align-middle metrics-table mb-0">
                <thead><tr><th>Service</th><th>State</th><th class="text-end">Action</th></tr></thead>
                <tbody id="tm-cb-tbody">
                  <tr><td colspan="3" class="text-center text-muted py-3">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-5">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-white"><strong>Simulation</strong></div>
          <div class="card-body">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" role="switch" id="tm-sim-payment-fail">
              <label class="form-check-label" for="tm-sim-payment-fail">Simulate payment failure</label>
            </div>
            <p class="text-muted small mb-0 mt-2">Forces the PayHere sandbox to return failed callbacks.</p>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header bg-white"><strong>System Broadcast</strong></div>
          <div class="card-body">
            <form id="tm-broadcast-form">
              <div class="mb-2">
                <label class="form-label" for="tm-bc-title">Title</label>
                <input type="text" class="form-control" id="tm-bc-title" maxlength="120" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="tm-bc-message">Message</label>
                <textarea class="form-control" id="tm-bc-message" rows="3" maxlength="500" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary" id="tm-bc-submit">Broadcast to all users</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/websocket.js"></script>
  <script src="../js/metrics.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('');
      if (!requireRole('ADMIN')) return;

      const simToggle = document.getElementById('tm-sim-payment-fail');
      let simBusy = false;

      async function refresh() {
        const [metrics, breakers] = await Promise.all([
          apiCall('GET', '/metrics'),
          apiCall('GET', '/metrics/circuit-breakers')
        ]);

        tmSetText('tm-uptime', TMMetrics.uptime(metrics));
        tmSetText('tm-active-users', TMMetrics.activeUsers(metrics).toLocaleString());
        tmSetText('tm-total-requests', TMMetrics.totalRequests(metrics).toLocaleString());
        tmSetText('tm-avg-response', TMMetrics.avgResponseMs(metrics).toLocaleString());

        renderCircuitBreakerTable('tm-cb-tbody', breakers, true, onResetBreaker);

        tmSetText('tm-last-updated', 'updated ' + new Date().toLocaleTimeString());
      }

      async function onResetBreaker(service, btn) {
        btn.disabled = true;
        try {
          await apiCall('POST', '/metrics/circuit-breakers/' + encodeURIComponent(service) + '/reset');
          showToast('Circuit breaker "' + service + '" reset', 'success');
          await refresh();
        } catch (e) {
          btn.disabled = false;
        }
      }

      simToggle.addEventListener('change', async () => {
        if (simBusy) return;
        simBusy = true;
        const enabled = simToggle.checked;
        try {
          await apiCall('POST', '/metrics/simulate/payment-failure', { enabled });
          showToast('Payment-failure simulation ' + (enabled ? 'enabled' : 'disabled'), 'warning');
        } catch (e) {
          simToggle.checked = !enabled; /* revert on failure */
        } finally {
          simBusy = false;
        }
      });

      const bcForm = document.getElementById('tm-broadcast-form');
      bcForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('tm-bc-title').value.trim();
        const message = document.getElementById('tm-bc-message').value.trim();
        if (!title || !message) return;
        const btn = document.getElementById('tm-bc-submit');
        btn.disabled = true;
        try {
          await apiCall('POST', '/metrics/broadcast', { title, message });
          showToast('Broadcast sent', 'success');
          bcForm.reset();
        } catch (e) { /* toast already shown */ }
        finally { btn.disabled = false; }
      });

      startAutoRefresh(refresh, 5000);
    });
  </script>
</body></html>
