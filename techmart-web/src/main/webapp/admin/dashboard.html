<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard · Admin · TechMart Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="../css/dashboard.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head><body>
  <div id="tm-navbar"></div>
  <div class="d-flex">
    <aside id="tm-admin-sidebar" class="d-none d-md-block" style="width:230px"></aside>
    <main class="container-fluid py-4 px-4 flex-grow-1">
      <h3 class="mb-4">Admin Dashboard</h3>

      <div id="tm-metric-cards" class="row g-3 mb-4">

      </div>

      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card shadow-sm h-100">
            <div class="card-header fw-semibold">Orders by status</div>
            <div class="card-body">
              <div class="chart-box"><canvas id="tm-status-chart"></canvas></div>
            </div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="card shadow-sm h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span class="fw-semibold">Recent orders</span>
              <a class="btn btn-sm btn-outline-primary" id="tm-all-orders-link">View all</a>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-sm table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr><th>Order #</th><th>Customer</th><th>Status</th><th class="text-end">Total</th><th>Date</th></tr>
                  </thead>
                  <tbody id="tm-recent-orders"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script><script src="../js/auth.js"></script><script src="../js/websocket.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    let statusChart = null;

    function renderMetricCards(orders, uptime, lowStockCount) {
      const totalOrders = (orders.pending || 0) + (orders.processing || 0) + (orders.shipped || 0) +
        (orders.delivered || 0) + (orders.cancelled || 0);
      const cards = [
        adminMetricCard('Revenue Today', formatCurrency(orders.revenueToday), totalOrders + ' orders total', 'green'),
        adminMetricCard('Pending Orders', String(orders.pending || 0), (orders.processing || 0) + ' processing', 'blue'),
        adminMetricCard('Active Users', String((uptime && uptime.activeUsers) || 0), 'Uptime ' + ((uptime && uptime.uptime) || '-'), 'purple'),
        adminMetricCard('Low Stock Items', String(lowStockCount), lowStockCount > 0 ? 'Needs attention' : 'All healthy', lowStockCount > 0 ? 'red' : 'teal')
      ];
      document.getElementById('tm-metric-cards').innerHTML =
        cards.map(c => '<div class="col-6 col-xl-3">' + c + '</div>').join('');
    }

    function renderStatusChart(orders) {
      const labels = ['Pending', 'Processing', 'Shipped', 'Delivered', 'Cancelled'];
      const data = [orders.pending || 0, orders.processing || 0, orders.shipped || 0,
        orders.delivered || 0, orders.cancelled || 0];
      const colors = ['#6c757d', '#0d6efd', '#fd7e14', '#198754', '#dc3545'];
      const ctx = document.getElementById('tm-status-chart');
      if (statusChart) statusChart.destroy();
      statusChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 1 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });
    }

    function renderRecentOrders(orders) {
      const latest = (orders || []).slice(0, 10);
      const rows = latest.map(o =>
        '<tr>' +
        '<td><a href="' + APP_BASE + 'order-confirmation.html?id=' + o.id + '">' + escapeHtml(o.orderNumber || ('#' + o.id)) + '</a></td>' +
        '<td>' + escapeHtml(o.username || '-') + '</td>' +
        '<td>' + statusBadge(o.status) + '</td>' +
        '<td class="text-end">' + formatCurrency(o.totalAmount) + '</td>' +
        '<td><small>' + escapeHtml(formatDate(o.orderDate)) + '</small></td>' +
        '</tr>'
      );
      adminFillTable('tm-recent-orders', rows, 5, 'No orders yet.');
    }

    async function loadDashboard() {
      // Each section is independent; failures show their own toast via apiCall.
      try {
        const [orders, uptime, lowStock] = await Promise.all([
          apiCall('GET', '/metrics/orders'),
          apiCall('GET', '/metrics/uptime').catch(() => null),
          apiCall('GET', '/inventory/low-stock').catch(() => [])
        ]);
        const lowStockCount = Array.isArray(lowStock) ? lowStock.length : 0;
        renderMetricCards(orders, uptime, lowStockCount);
        renderStatusChart(orders);
      } catch (e) { /* toast already shown */ }

      try {
        const all = await apiCall('GET', '/orders/admin/all');
        renderRecentOrders(all);
      } catch (e) { adminFillTable('tm-recent-orders', [], 5, 'Could not load orders.'); }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!requireRole('ADMIN')) return;
      renderNavbar('');
      renderAdminSidebar('dashboard');
      adminTableLoading('tm-recent-orders', 5);
      document.getElementById('tm-all-orders-link').href = APP_BASE + 'admin/orders.html';
      loadDashboard();
      // Refresh when a relevant push arrives.
      window.onTechMartNotification = function (msg) {
        if (msg && (msg.type === 'ORDER_UPDATE' || msg.type === 'STOCK_ALERT')) loadDashboard();
      };
    });
  </script>
</body></html>
