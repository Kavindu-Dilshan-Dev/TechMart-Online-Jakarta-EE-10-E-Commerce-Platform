<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product · TechMart Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head><body>
  <div id="tm-navbar"></div>

  <main class="container py-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item"><a href="products.html">Products</a></li>
        <li class="breadcrumb-item active" aria-current="page" id="bc-name">Detail</li>
      </ol>
    </nav>

    <div id="detail-root">
      <div class="tm-loading">Loading product…</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script><script src="js/auth.js"></script><script src="js/websocket.js"></script>
  <script src="js/products.js"></script>
  <script>
    function renderNotFound(root) {
      root.innerHTML =
        '<div class="alert alert-warning">' +
        '<h4 class="alert-heading">Product not found</h4>' +
        '<p>The product you are looking for is unavailable.</p>' +
        '<a href="products.html" class="btn btn-primary">Back to products</a></div>';
    }

    function renderProduct(p, root) {
      const out = !p.inStock || Number(p.totalStock || 0) <= 0;
      const img = p.imageUrl ? escapeHtml(p.imageUrl) : TM_PRODUCT_PLACEHOLDER;
      document.getElementById('bc-name').textContent = p.name || 'Detail';
      document.title = (p.name || 'Product') + ' · TechMart Online';

      const actions = out
        ? '<div class="alert alert-secondary">This item is currently out of stock.</div>' +
          '<button id="notify-btn" type="button" class="btn btn-outline-primary">' +
          'Notify me when back in stock</button>'
        : '<div class="d-flex align-items-end gap-2 flex-wrap">' +
            '<div style="max-width:120px">' +
              '<label for="qty" class="form-label small mb-1">Quantity</label>' +
              '<input id="qty" type="number" class="form-control" value="1" min="1" max="' +
                Number(p.totalStock) + '">' +
            '</div>' +
            '<button id="add-btn" type="button" class="btn btn-primary btn-lg">Add to cart</button>' +
          '</div>';

      root.innerHTML =
        '<div class="row g-4">' +
          '<div class="col-md-6">' +
            '<div class="card"><img src="' + img + '" class="card-img-top" alt="' +
              escapeHtml(p.name || '') + '" style="height:auto;max-height:480px;object-fit:contain;background:#fff" ' +
              'onerror="this.onerror=null;this.src=\'' + TM_PRODUCT_PLACEHOLDER + '\'"></div>' +
          '</div>' +
          '<div class="col-md-6">' +
            '<div class="text-muted">' + escapeHtml(p.brand || '') +
              (p.categoryName ? (' · ' + escapeHtml(p.categoryName)) : '') + '</div>' +
            '<h1 class="h3 mt-1">' + escapeHtml(p.name || '') + '</h1>' +
            (p.sku ? '<div class="text-muted small mb-2">SKU: ' + escapeHtml(p.sku) + '</div>' : '') +
            '<div class="my-3">' + priceHtml(p) + '</div>' +
            '<div class="mb-3">' + stockBadgeHtml(p) + '</div>' +
            '<p class="text-secondary">' + escapeHtml(p.description || 'No description available.') + '</p>' +
            '<hr>' +
            actions +
          '</div>' +
        '</div>';

      if (out) {
        document.getElementById('notify-btn').addEventListener('click', () => requestStockAlert(p.id));
      } else {
        document.getElementById('add-btn').addEventListener('click', () => {
          const qty = parseInt(document.getElementById('qty').value, 10) || 1;
          addToCart(p.id, qty);
        });
      }
    }

    async function requestStockAlert(id) {
      if (!isLoggedIn()) {
        showToast('Please sign in to get back-in-stock alerts', 'warning');
        setTimeout(() => location.href = 'login.html', 600);
        return;
      }
      const btn = document.getElementById('notify-btn');
      try {
        await apiCall('POST', '/products/' + encodeURIComponent(id) + '/stock-alert');
        if (btn) { btn.disabled = true; btn.textContent = 'You will be notified'; }
        showToast('We will notify you when this item is back in stock', 'success');
      } catch (e) {
        /* apiCall already showed a toast */
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar('products');
      refreshCartCount();

      const root = document.getElementById('detail-root');
      const id = getQueryParam('id');
      if (!id) { renderNotFound(root); return; }

      try {
        const p = await apiCall('GET', '/products/' + encodeURIComponent(id));
        if (!p) { renderNotFound(root); return; }
        renderProduct(p, root);
      } catch (e) {
        renderNotFound(root);
      }
    });
  </script>
</body></html>
