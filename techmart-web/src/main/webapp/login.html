<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · TechMart Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head><body class="bg-light">
  <div id="tm-navbar"></div>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 fw-bold text-center mb-1">Welcome back</h1>
            <p class="text-muted text-center mb-4">Sign in to your TechMart account</p>

            <div class="mb-3">
              <div class="form-text mb-1">Quick demo login</div>
              <div class="btn-group w-100" role="group" aria-label="Demo credentials">
                <button type="button" class="btn btn-outline-secondary" id="demo-customer">Customer</button>
                <button type="button" class="btn btn-outline-secondary" id="demo-admin">Admin</button>
                <button type="button" class="btn btn-outline-secondary" id="demo-developer">Developer</button>
              </div>
            </div>

            <form id="login-form" novalidate>
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
              </div>
              <button type="submit" class="btn btn-primary w-100" id="login-btn">Sign in</button>
            </form>

            <p class="text-center text-muted mt-4 mb-0">
              Don't have an account? <a href="register.html">Create one</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script><script src="js/auth.js"></script><script src="js/websocket.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('');

      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');

      const DEMO = {
        customer: { username: 'customer', password: 'password123' },
        admin: { username: 'admin', password: 'admin123' },
        developer: { username: 'devuser', password: 'dev123' }
      };
      function prefill(key) {
        const creds = DEMO[key];
        if (!creds) return;
        usernameEl.value = creds.username;
        passwordEl.value = creds.password;
        usernameEl.focus();
      }
      document.getElementById('demo-customer').addEventListener('click', () => prefill('customer'));
      document.getElementById('demo-admin').addEventListener('click', () => prefill('admin'));
      document.getElementById('demo-developer').addEventListener('click', () => prefill('developer'));

      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = usernameEl.value.trim();
        const password = passwordEl.value;
        if (!username || !password) {
          showToast('Please enter your username and password', 'warning');
          return;
        }
        btn.disabled = true;
        try {
          const user = await login(username, password);
          showToast('Signed in. Redirecting…', 'success');
          location.href = roleHome(user.role);
        } catch (err) {
          /* apiCall already shows a toast on failure */
          btn.disabled = false;
        }
      });
    });
  </script>
</body></html>
