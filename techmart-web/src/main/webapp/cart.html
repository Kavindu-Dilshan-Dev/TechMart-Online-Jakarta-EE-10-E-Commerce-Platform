<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Cart · TechMart Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head><body>
  <div id="tm-navbar"></div>
  <main class="container py-4">
    <h2 class="mb-4">Your Cart</h2>
    <div id="tm-cart">
      <div class="text-center text-muted py-5">Loading cart…</div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script><script src="js/auth.js"></script><script src="js/websocket.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('');
      if (!requireAuth()) return;
      loadCart();
    });
  </script>
</body></html>
